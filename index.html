<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Genesis</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 2px;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 80%;
            max-width: 500px;
        }
        button {
            background-color: #ffffff;
            color: #121212;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        button:hover {
            background-color: #e0e0e0;
            transform: scale(1.05);
        }
        button.recording {
            background-color: #e74c3c;
            color: white;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }
        #status {
            margin-top: 20px;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>GENESIS VOICE AI</h1>
        <p>Experience the luxury of Genesis.</p>
        <button id="talkButton">Start Conversation</button>
        <div id="status">Ready.</div>
    </div>

    <script>
        let ws;
        let audioContext;
        let mediaStream;
        let processor;
        
        const talkButton = document.getElementById('talkButton');
        const statusDiv = document.getElementById('status');
        
        // Audio Queue for seamless playback
        let audioQueue = [];
        let isPlaying = false;
        let currentSource = null;

        async function playNextAudio() {
            if (audioQueue.length === 0) {
                isPlaying = false;
                currentSource = null;
                return;
            }
            isPlaying = true;
            const audioData = audioQueue.shift();
            
            const audioBuffer = await audioContext.decodeAudioData(audioData.buffer);
            currentSource = audioContext.createBufferSource();
            currentSource.buffer = audioBuffer;
            currentSource.connect(audioContext.destination);
            
            currentSource.onended = () => {
                playNextAudio();
            };
            currentSource.start();
        }

        // Add WAV Header to raw PCM since browser needs it for decodeAudioData
        function addWavHeader(samples) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);

            // RIFF chunk descriptor
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(view, 8, 'WAVE');

            // FMT sub-chunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true); // Subchunk1Size (16 for PCM)
            view.setUint16(20, 1, true); // AudioFormat (1 for PCM)
            view.setUint16(22, 1, true); // NumChannels (1 channel)
            view.setUint32(24, 16000, true); // SampleRate
            view.setUint32(28, 16000 * 2, true); // ByteRate
            view.setUint16(32, 2, true); // BlockAlign
            view.setUint16(34, 16, true); // BitsPerSample

            // Data sub-chunk
            writeString(view, 36, 'data');
            view.setUint32(40, samples.length * 2, true);

            // PCM samples
            let offset = 44;
            for (let i = 0; i < samples.length; i++, offset += 2) {
                view.setInt16(offset, samples[i], true);
            }

            return new Uint8Array(buffer);
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        talkButton.addEventListener('click', async () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                // Stop connection gracefully
                ws.close(1000, "User ended conversation");
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                if (audioContext) {
                    audioContext.close();
                }
                talkButton.innerText = "Start Conversation";
                talkButton.classList.remove("recording");
                statusDiv.innerText = "Disconnected.";
                return;
            }

            // Initialize connection
            statusDiv.innerText = "Connecting...";
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/chat`);
            ws.binaryType = "arraybuffer";

            ws.onopen = async () => {
                statusDiv.innerText = "Connected. Please speak.";
                talkButton.innerText = "End Conversation";
                talkButton.classList.add("recording");
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                
                try {
                    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    // Explicitly request opus codec which Deepgram is expecting
                    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                        ? 'audio/webm;codecs=opus'
                        : 'audio/webm';
                    statusDiv.innerText = `Listening (${mimeType})...`;
                    
                    const mediaRecorder = new MediaRecorder(mediaStream, { mimeType });
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) {
                            ws.send(e.data);
                        }
                    };
                    mediaRecorder.start(250); // send a chunk every 250ms
                } catch (err) {
                    statusDiv.innerText = "Microphone access denied.";
                    console.error(err);
                }
            };

            ws.onmessage = async (event) => {
                if (typeof event.data === "string") {
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg.type === "interrupt") {
                            // Barge-in requested! Clear queue and stop playing
                            audioQueue = [];
                            if (currentSource) {
                                currentSource.stop();
                                currentSource = null;
                            }
                            isPlaying = false;
                        }
                    } catch(e) {}
                    return;
                }
                
                // Received PCM chunk from server (TTS)
                const rawPCM = new Int16Array(event.data);
                const wavData = addWavHeader(rawPCM);
                
                audioQueue.push(wavData);
                if (!isPlaying) {
                    playNextAudio();
                }
            };

            ws.onclose = () => {
                statusDiv.innerText = "Connection closed.";
                talkButton.innerText = "Start Conversation";
                talkButton.classList.remove("recording");
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
            };
        });
    </script>
</body>
</html>
